kind = "web"
previewPath = "/"
title = "E-Commerce Store"
version = "1.0.0"
id = "artifacts/store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24964

[services.development]
run = "pnpm --filter @workspace/store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/store", "run", "build" ]
run = "pnpm --filter @workspace/store run start"

[services.env]
PORT = "24964"
