name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Reliable gate: typecheck + pure unit/property tests ──────────────────
  # No external dependencies (no DB secrets, no running servers, no browsers).
  # This job must always pass and gates every push to main.
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run unit tests (store)
        run: pnpm exec vitest --run --project store-unit

  # ─── Integration + E2E: requires Supabase secrets and running servers ─────
  # Runs only after the unit gate passes. Needs repo secrets:
  # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY.
  integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @workspace/store exec playwright install --with-deps chromium

      - name: Run component tests
        run: pnpm --filter @workspace/store run test:ct:ci

      - name: Seed test data
        run: pnpm run seed:test

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Start API server
        run: pnpm --filter @workspace/api-server run start &
        env:
          PORT: "5000"
          NODE_ENV: development

      - name: Wait for API health endpoint
        run: |
          timeout=30
          elapsed=0
          until curl -sf http://localhost:5000/api/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "API server failed to start within ${timeout}s"
              exit 1
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          echo "API server is healthy"

      - name: Run API integration tests
        run: pnpm exec vitest --run --project api-integration --project env-validation

      - name: Start store dev server
        run: pnpm --filter @workspace/store run dev &
        env:
          VITE_API_BASE_URL: http://localhost:5000/api
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Wait for store server
        run: |
          timeout=60
          elapsed=0
          until curl -sf http://localhost:3000 > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "Store server failed to start within ${timeout}s"
              exit 1
            fi
            sleep 1
            elapsed=$((elapsed + 1))
          done
          echo "Store server is ready"

      - name: Run E2E tests
        run: pnpm --filter @workspace/store run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/store/test-results/
          retention-days: 7
